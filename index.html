<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Husk - Logg inn</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <main class="login-shell">
    <section class="login-card card shadow-sm">
      <div class="card-body p-4 text-center">
        <p class="eyebrow mb-2">Privat</p>
        <h1 class="h3 mb-2">Husk</h1>
        <p class="text-muted mb-4">En liten delt innboks.</p>

        <div id="error-msg" class="alert alert-danger d-none text-start" role="alert"></div>
        <div id="standalone-msg" class="alert alert-warning d-none text-start small" role="alert">
          Innlogging med Google fungerer best i Safari, ikke fra hjemskjermen pa iPhone/iPad.
        </div>

        <button id="google-btn" class="btn btn-dark w-100 d-flex align-items-center justify-content-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Logg inn med Google
        </button>
      </div>
    </section>
  </main>

  <script type="module">
    const errorMsg = document.getElementById('error-msg');
    const standaloneMsg = document.getElementById('standalone-msg');
    const loginButton = document.getElementById('google-btn');

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.classList.remove('d-none');
    }

    function getAuthErrorMessage(err) {
      const code = String(err?.code || '');
      if (code === 'auth/unauthorized-domain') {
        return 'Dette domenet er ikke godkjent i Firebase Auth. Legg til tkjelsrud.github.io under Firebase Authentication -> Settings -> Authorized domains.';
      }

      if (code === 'auth/popup-blocked') {
        return 'Innloggingsvinduet fra Google ble blokkert av nettleseren. Tillat popup-vinduer og prov igjen.';
      }

      if (code === 'auth/popup-closed-by-user') {
        return 'Innloggingsvinduet ble lukket for innloggingen var ferdig.';
      }

      if (code === 'auth/cancelled-popup-request') {
        return 'Et tidligere innloggingsvindu er fortsatt aktivt. Lukk det og prov igjen.';
      }

      if (code === 'auth/web-storage-unsupported') {
        return 'Nettleseren blokkerer lagring som Google-innlogging trenger. Prov i vanlig Safari-vindu, ikke privat modus.';
      }

      return `Innlogging feilet: ${code || 'ukjent feil'}. Sjekk nettleserkonsollen for detaljer.`;
    }

    function isIosStandaloneMode() {
      const standaloneByDisplayMode = window.matchMedia?.('(display-mode: standalone)').matches;
      const standaloneByNavigator = window.navigator.standalone === true;
      const isIOSDevice = /iPad|iPhone|iPod/.test(window.navigator.userAgent || '')
        || (window.navigator.platform === 'MacIntel' && window.navigator.maxTouchPoints > 1);
      return isIOSDevice && (standaloneByDisplayMode || standaloneByNavigator);
    }

    if (isIosStandaloneMode()) {
      standaloneMsg.classList.remove('d-none');
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('reason') === 'unauthorized') {
      showError('Denne Google-kontoen har ikke tilgang.');
    }

    try {
      const [{ auth, loginWithGoogle, finalizeLoginRedirect, isAuthorizedUser, logout }, { onAuthStateChanged }] = await Promise.all([
        import('./js/auth.js'),
        import('https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js')
      ]);

      try {
        await finalizeLoginRedirect();
      } catch (err) {
        showError(getAuthErrorMessage(err));
        console.error(err);
      }

      onAuthStateChanged(auth, async (user) => {
        if (!user) return;

        if (!await isAuthorizedUser(user)) {
          await logout('unauthorized');
          return;
        }

        window.location.href = 'dashboard.html';
      });

      loginButton.addEventListener('click', async () => {
        errorMsg.classList.add('d-none');
        try {
          const result = await loginWithGoogle();
          if (result?.redirected) return;
          if (!await isAuthorizedUser(auth.currentUser)) {
            await logout('unauthorized');
            return;
          }
          window.location.href = 'dashboard.html';
        } catch (err) {
          showError(getAuthErrorMessage(err));
          console.error(err);
        }
      });
    } catch (err) {
      loginButton.disabled = true;
      showError('Firebase-oppsett mangler i deployen.');
      console.error(err);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Husk - New entry</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <nav class="navbar navbar-expand-sm navbar-dark app-nav">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">Husk</a>
      <div class="navbar-nav ms-auto align-items-sm-center gap-sm-2">
        <a class="nav-link active" href="dashboard.html">New entry</a>
        <a class="nav-link" href="entries.html">Entries</a>
        <span id="user-label" class="nav-user small"></span>
        <button id="logout-btn" class="btn btn-outline-light btn-sm" type="button">Log out</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <section class="card form-card">
          <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
              <div>
                <p class="eyebrow mb-1">Input</p>
                <h1 class="h4 mb-1">Add today's note</h1>
                <p class="text-muted mb-0">Enter 1 to 5 lines. New entries are stored as unprocessed.</p>
              </div>
              <span id="date-pill" class="date-pill"></span>
            </div>

            <div id="status-msg" class="alert d-none" role="alert"></div>

            <form id="entry-form" novalidate>
              <label class="form-label" for="entry-text">Text</label>
              <textarea
                id="entry-text"
                class="form-control form-control-lg"
                rows="5"
                maxlength="1500"
                placeholder="Line 1&#10;Line 2&#10;Line 3"
                required
              ></textarea>
              <div class="form-text">Use up to 5 non-empty lines.</div>

              <div class="d-flex justify-content-between align-items-center mt-4 gap-3 flex-wrap">
                <div class="small text-muted">Saved with today's date and <code>processed = false</code>.</div>
                <button id="submit-btn" class="btn btn-dark" type="submit">Save entry</button>
              </div>
            </form>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script type="module">
    import('./js/dashboard.js').catch((err) => {
      const status = document.getElementById('status-msg');
      status.textContent = 'Page setup failed. Check Firebase config and runtime allowlist.';
      status.className = 'alert alert-danger';
      status.classList.remove('d-none');
      console.error(err);
    });
  </script>
</body>
</html>

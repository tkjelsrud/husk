<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Husk</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <nav class="navbar navbar-expand-sm navbar-dark app-nav app-nav-compact">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">Husk</a>
      <div class="app-nav-links navbar-nav ms-auto align-items-sm-center gap-sm-2">
        <a class="nav-link active" href="dashboard.html">Ny</a>
        <a class="nav-link" href="entries.html">Liste</a>
        <span id="user-label" class="nav-user small"></span>
        <button id="logout-btn" class="btn btn-outline-light btn-sm" type="button">Logg ut</button>
      </div>
    </div>
  </nav>

  <main class="container py-3 entries-page">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <section class="card form-card">
          <div class="card-body p-4">
            <div class="mb-4">
              <h1 class="h4 mb-0">Husk</h1>
            </div>

            <div id="status-msg" class="alert d-none" role="alert"></div>

            <form id="entry-form" novalidate>
              <label class="form-label" for="entry-text">Husk</label>
              <textarea
                id="entry-text"
                class="form-control form-control-lg"
                rows="5"
                maxlength="1500"
                placeholder="Skriv her"
                required
              ></textarea>

              <div class="mt-3">
                <label class="form-label" for="entry-category">Kategori</label>
                <select id="entry-category" class="form-select">
                  <option value="unknown" selected>Ukjent</option>
                  <option value="work">Jobb</option>
                  <option value="creative">Kreativt</option>
                  <option value="houseproj">Houseproj</option>
                  <option value="family">Familie</option>
                  <option value="general">Generelt</option>
                  <option value="huskmcp">Husk MCP</option>
                </select>
              </div>

              <div class="d-flex justify-content-end align-items-center mt-4 gap-3 flex-wrap">
                <button id="submit-btn" class="btn btn-dark" type="submit">Lagre</button>
              </div>
            </form>
          </div>
        </section>

        <section id="recent-section" class="mt-3 d-none">
          <p class="eyebrow mb-2" style="font-size:0.72rem">Siste</p>
          <div id="recent-list" class="recent-list"></div>
        </section>
      </div>
    </div>
  </main>

  <script type="module" src="./js/dashboard.js"></script>
</body>
</html>

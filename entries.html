<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Husk - Liste</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <nav class="navbar navbar-expand-sm navbar-dark app-nav">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">Husk</a>
      <div class="app-nav-links navbar-nav ms-auto align-items-sm-center gap-sm-2">
        <a class="nav-link" href="dashboard.html">Ny</a>
        <a class="nav-link active" href="entries.html">Liste</a>
        <span id="user-label" class="nav-user small"></span>
        <button id="logout-btn" class="btn btn-outline-light btn-sm" type="button">Logg ut</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <section class="card">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-start gap-3 mb-4 flex-wrap">
          <div>
            <p class="eyebrow mb-1">Oversikt</p>
            <h1 class="h4 mb-1">Liste</h1>
          </div>
          <button id="refresh-btn" class="btn btn-outline-secondary" type="button">Oppdater</button>
        </div>

        <div id="status-msg" class="alert d-none" role="alert"></div>

        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th scope="col">Opprettet</th>
                <th scope="col">Tekst</th>
                <th scope="col">Kategori</th>
                <th scope="col">Prioritet</th>
                <th scope="col">Behandlet</th>
                <th scope="col">Frist</th>
                <th scope="col">Lagt til av</th>
              </tr>
            </thead>
            <tbody id="entries-body">
              <tr>
                <td colspan="7" class="text-muted py-4">Laster...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="./js/entries-page.js"></script>
</body>
</html>

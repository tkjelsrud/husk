<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Husk - Entries</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <nav class="navbar navbar-expand-sm navbar-dark app-nav">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">Husk</a>
      <div class="navbar-nav ms-auto align-items-sm-center gap-sm-2">
        <a class="nav-link" href="dashboard.html">New entry</a>
        <a class="nav-link active" href="entries.html">Entries</a>
        <span id="user-label" class="nav-user small"></span>
        <button id="logout-btn" class="btn btn-outline-light btn-sm" type="button">Log out</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <section class="card">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-start gap-3 mb-4 flex-wrap">
          <div>
            <p class="eyebrow mb-1">Overview</p>
            <h1 class="h4 mb-1">Submitted entries</h1>
            <p class="text-muted mb-0">Read-only list of all stored inputs.</p>
          </div>
          <button id="refresh-btn" class="btn btn-outline-secondary" type="button">Refresh</button>
        </div>

        <div id="status-msg" class="alert d-none" role="alert"></div>

        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th scope="col">Date</th>
                <th scope="col">Text</th>
                <th scope="col">Processed</th>
                <th scope="col">Added by</th>
              </tr>
            </thead>
            <tbody id="entries-body">
              <tr>
                <td colspan="4" class="text-muted py-4">Loading entries...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import('./js/entries-page.js').catch((err) => {
      const status = document.getElementById('status-msg');
      status.textContent = 'Page setup failed. Check Firebase config and runtime allowlist.';
      status.className = 'alert alert-danger';
      status.classList.remove('d-none');
      console.error(err);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Husk - Liste</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <nav class="navbar navbar-expand-sm navbar-dark app-nav app-nav-compact">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">Husk</a>
      <div class="app-nav-links navbar-nav ms-auto align-items-sm-center gap-sm-2">
        <a class="nav-link" href="dashboard.html">Ny</a>
        <a class="nav-link active" href="entries.html">Liste</a>
        <span id="user-label" class="nav-user small"></span>
        <button id="logout-btn" class="btn btn-outline-light btn-sm" type="button">Logg ut</button>
      </div>
    </div>
  </nav>

  <main class="container py-3 entries-page">
    <section class="card">
      <div class="card-body p-3 p-sm-4">
        <div class="entries-toolbar d-flex justify-content-between align-items-center gap-2 mb-3 flex-wrap">
          <div>
            <p class="eyebrow mb-1 d-none d-sm-block">Oversikt</p>
            <h1 class="h5 mb-0">Liste</h1>
          </div>
          <div class="entries-toolbar-actions d-flex align-items-center gap-2 flex-wrap justify-content-end">
            <div id="entries-filter-summary" class="entries-filter-summary text-muted small">Skjuler gamle og forfalte notater</div>
            <button id="toggle-hidden-btn" class="btn btn-link btn-sm entries-toggle-btn" type="button">Vis alle</button>
            <button id="refresh-btn" class="btn btn-outline-secondary btn-sm" type="button">Oppdater</button>
          </div>
        </div>

        <div id="status-msg" class="alert d-none" role="alert"></div>

        <div id="entries-desktop-list" class="entries-list entries-list-desktop d-none d-md-grid" aria-live="polite">
          <div class="text-muted py-3">Laster...</div>
        </div>

        <div id="entries-list" class="entries-list d-md-none" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script type="module" src="./js/entries-page.js"></script>
</body>
</html>
